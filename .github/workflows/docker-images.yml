name: docker images d

on:
  workflow_dispatch:
    inputs:
      release:
        description: 'Publish release (untick for test only)'
        default: 'true'
        required: true
        type: boolean
      debian_version:
        description: 'Debian version (buster vs buster-testing)'
        default: 'bookworm'
        required: true
        type: string

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      actions: write
    steps:
      - name: Set build number
        run: echo "BUILD_NUMBER=${{ vars.BUILD_NUMBER }}" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl gzip python3-pip
          pip3 install htmlq
        shell: bash

      - name: Get package version
        run: |
          changelog=$(curl "https://www.3cx.com/blog/change-log/phone-system-change-log/" --silent | htmlq "h2 + ul" -1)
          url=http://repo.3cx.com/3cx/dists/${{ github.event.inputs.debian_version }}/main/binary-amd64/Packages.gz
          package=3cxpbx
          package_version=$(curl -s $url | gunzip | grep -A 10 "^Package: $package$" | awk '/Version: / { print $2 }' | sort -r | head -1)
          if [[ ! $(curl "https://www.3cx.com/blog/change-log/phone-system-change-log/" --silent | htmlq "h2" -1) == *"${package_version}"* ]]; then changelog=""; fi
          major_version=$(echo $package_version | cut -d. -f1)
          echo package_version=$package_version >> $GITHUB_ENV
          echo major_version=$major_version >> $GITHUB_ENV
          echo changelog=$changelog >> $GITHUB_ENV
        shell: bash

      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to DockerHub
        if: github.event.inputs.release == 'true'
        uses: docker/login-action@v3.1.0
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to GitHub Container Registry
        if: github.event.inputs.release == 'true'
        uses: docker/login-action@v3.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build stage1 image
        run: |
          docker build \
            --force-rm \
            --no-cache \
            --build-arg PACKAGE_VERSION=${{ env.package_version }} \
            --build-arg DEBIAN_VERSION=${{ github.event.inputs.debian_version }} \
            --build-arg BUILD_STRING="$(date -u)" \
            --build-arg BUILD_DATE="$(date +%d-%m-%Y)" \
            --build-arg BUILD_TIME="$(date +%H:%M:%S)" \
            -t 3cx_stage1 .

      - name: Install 3cxpbx in running container (stage2)
        run: |
          # Pornire container cu systemd
          docker run -d --privileged --cgroupns=host \
            -v /sys/fs/cgroup:/sys/fs/cgroup:rw \
            --name 3cx_stage1_c 3cx_stage1

          # Asteapta systemd sa fie gata
          echo "Waiting for systemd..."
          for i in $(seq 1 40); do
            status=$(docker exec 3cx_stage1_c systemctl is-system-running 2>/dev/null || true)
            echo "[$i] $status"
            if echo "$status" | grep -qE "running|degraded"; then break; fi
            sleep 5
          done

          # Instaleaza 3cxpbx si activeaza servicii
          docker exec 3cx_stage1_c bash -c "
            systemctl mask systemd-logind console-getty.service container-getty@.service \
              getty-static.service getty@.service serial-getty@.service getty.target \
            && apt-get update \
            && echo 1 | apt-get -y install 3cxpbx=${{ env.package_version }} \
            && systemctl enable nginx postgresql 3cx_fix_perms.service 3cx_autosetup.service \
            && (systemctl enable exim4 2>/dev/null || true)
          "

          docker stop 3cx_stage1_c

      - name: Commit and tag image
        run: |
          IMAGE_TAG="v${{ env.major_version }}.${{ env.BUILD_NUMBER }}"

          docker commit 3cx_stage1_c ${{ secrets.DOCKER_USER }}/3cx:${IMAGE_TAG}
          docker tag ${{ secrets.DOCKER_USER }}/3cx:${IMAGE_TAG} ${{ secrets.DOCKER_USER }}/3cx:latest
          docker tag ${{ secrets.DOCKER_USER }}/3cx:${IMAGE_TAG} ghcr.io/levinetit/3cx:${IMAGE_TAG}
          docker tag ${{ secrets.DOCKER_USER }}/3cx:${IMAGE_TAG} ghcr.io/levinetit/3cx:latest
          docker tag ${{ secrets.DOCKER_USER }}/3cx:${IMAGE_TAG} ghcr.io/levinetit/3cx:${{ env.BUILD_NUMBER }}

          docker rm 3cx_stage1_c
          docker rmi 3cx_stage1

          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV

      - name: Push images (release only)
        if: github.event.inputs.release == 'true'
        run: |
          docker push ${{ secrets.DOCKER_USER }}/3cx:${{ env.IMAGE_TAG }}
          docker push ${{ secrets.DOCKER_USER }}/3cx:latest
          docker push ghcr.io/levinetit/3cx:${{ env.IMAGE_TAG }}
          docker push ghcr.io/levinetit/3cx:latest
          docker push ghcr.io/levinetit/3cx:${{ env.BUILD_NUMBER }}

      - name: Increment build number
        if: github.event.inputs.release == 'true'
        run: |
          next=$(( ${{ vars.BUILD_NUMBER }} + 1 ))
          curl -s -X PATCH \
            -H "Authorization: token ${{ secrets.GHCR_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/variables/BUILD_NUMBER" \
            -d "{\"name\":\"BUILD_NUMBER\",\"value\":\"$next\"}"

      - name: Create Release
        if: github.event.inputs.release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          NOTES="3CX docker image:
          > docker run levinetit/3cx:${{ env.IMAGE_TAG }}

          https://www.3cx.com/blog/change-log/phone-system-change-log/"

          gh release create "${{ env.IMAGE_TAG }}" \
            --repo "${{ github.repository }}" \
            --title "Release ${{ env.IMAGE_TAG }}" \
            --notes "$NOTES" || echo "Release already exists, skipping."

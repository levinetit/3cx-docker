name: docker images d

on:
  workflow_dispatch:
    inputs:
      release:
        description: 'Publish release (untick for test only)'
        default: 'true'
        required: true
        type: boolean
      debian_version:
        description: 'Debian version (buster vs buster-testing)'
        default: 'bookworm'
        required: true
        type: string

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      actions: write
    steps:
      - name: Set build number
        run: echo "BUILD_NUMBER=${{ vars.BUILD_NUMBER }}" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl gzip python3-pip
          pip3 install htmlq
        shell: bash

      - name: Get package version
        run: |
          changelog=$(curl "https://www.3cx.com/blog/change-log/phone-system-change-log/" --silent | htmlq "h2 + ul" -1)
          url=http://repo.3cx.com/3cx/dists/${{ github.event.inputs.debian_version }}/main/binary-amd64/Packages.gz
          package=3cxpbx
          package_version=$(curl -s $url | gunzip | grep -A 10 "^Package: $package$" | awk '/Version: / { print $2 }' | sort -r | head -1)
          if [[ ! $(curl "https://www.3cx.com/blog/change-log/phone-system-change-log/" --silent | htmlq "h2" -1) == *"${package_version}"* ]]; then changelog=""; fi
          major_version=$(echo $package_version | cut -d. -f1)
          echo package_version=$package_version >> $GITHUB_ENV
          echo major_version=$major_version >> $GITHUB_ENV
          echo changelog=$changelog >> $GITHUB_ENV
        shell: bash

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.3.0
        with:
          buildkitd-config: buildkitd.toml

      - name: Login to DockerHub
        if: github.event.inputs.release == 'true'
        uses: docker/login-action@v3.1.0
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to GitHub Container Registry
        if: github.event.inputs.release == 'true'
        uses: docker/login-action@v3.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build only (test)
        if: github.event.inputs.release != 'true'
        uses: docker/build-push-action@v5.3.0
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          build-args: |
            PACKAGE_VERSION=${{ env.package_version }}
            DEBIAN_VERSION=${{ github.event.inputs.debian_version }}

      - name: Build and push (release)
        if: github.event.inputs.release == 'true'
        uses: docker/build-push-action@v5.3.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            PACKAGE_VERSION=${{ env.package_version }}
            DEBIAN_VERSION=${{ github.event.inputs.debian_version }}
          tags: |
            ghcr.io/levinetit/3cx:${{ env.BUILD_NUMBER }}
            ghcr.io/levinetit/3cx:latest
            ${{ secrets.DOCKER_USER }}/3cx:latest
            ${{ secrets.DOCKER_USER }}/3cx:${{ env.package_version }}
            ${{ secrets.DOCKER_USER }}/3cx:${{ env.package_version }}-${{ github.run_number }}

      - name: Increment build number
        if: github.event.inputs.release == 'true'
        run: |
          next=$(( ${{ vars.BUILD_NUMBER }} + 1 ))
          curl -s -X PATCH \
            -H "Authorization: token ${{ secrets.GHCR_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/variables/BUILD_NUMBER" \
            -d "{\"name\":\"BUILD_NUMBER\",\"value\":\"$next\"}"

      - name: Create Release
        if: github.event.inputs.release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.major_version }}.${{ env.BUILD_NUMBER }}
          name: Release v${{ env.major_version }}.${{ env.BUILD_NUMBER }}
          body: |
            3CX docker image:
            > docker run levinetit/3cx:latest

            Changelog:
              ${{ env.changelog }}

            https://www.3cx.com/blog/change-log/phone-system-change-log/
name: Retag existing images

on:
  workflow_dispatch:

jobs:
  retag:
    runs-on: ubuntu-latest
    steps:
      - name: Login to DockerHub
        uses: docker/login-action@v3.1.0
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Retag 20.0.8.1109 -> v20.1 and v20.123
        run: |
          docker pull levinetit/3cx:20.0.8.1109
          docker tag  levinetit/3cx:20.0.8.1109 levinetit/3cx:v20.1
          docker tag  levinetit/3cx:20.0.8.1109 levinetit/3cx:v20.123
          docker push levinetit/3cx:v20.1
          docker push levinetit/3cx:v20.123
